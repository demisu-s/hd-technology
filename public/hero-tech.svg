<svg width="1200" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#48db9c;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#0C1525;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#48db9c;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#48db9c;stop-opacity:0.1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="400" fill="#0C1525"/>
  <rect x="0" y="0" width="1200" height="400" fill="url(#grad1)"/>
  
  <!-- Network nodes -->
  <circle cx="200" cy="150" r="60" fill="url(#grad2)" stroke="#48db9c" stroke-width="2" stroke-opacity="0.5"/>
  <circle cx="200" cy="150" r="30" fill="#48db9c" opacity="0.3"/>
  <circle cx="450" cy="200" r="80" fill="url(#grad2)" stroke="#48db9c" stroke-width="2" stroke-opacity="0.4"/>
  <circle cx="450" cy="200" r="40" fill="#48db9c" opacity="0.2"/>
  <circle cx="750" cy="130" r="50" fill="url(#grad2)" stroke="#48db9c" stroke-width="2" stroke-opacity="0.5"/>
  <circle cx="750" cy="130" r="25" fill="#48db9c" opacity="0.3"/>
  <circle cx="1000" cy="250" r="70" fill="url(#grad2)" stroke="#48db9c" stroke-width="2" stroke-opacity="0.3"/>
  <circle cx="1000" cy="250" r="35" fill="#48db9c" opacity="0.2"/>
  
  <!-- Connecting lines -->
  <line x1="200" y1="150" x2="450" y2="200" stroke="#48db9c" stroke-width="1.5" stroke-opacity="0.3"/>
  <line x1="450" y1="200" x2="750" y2="130" stroke="#48db9c" stroke-width="1.5" stroke-opacity="0.3"/>
  <line x1="750" y1="130" x2="1000" y2="250" stroke="#48db9c" stroke-width="1.5" stroke-opacity="0.3"/>
  <line x1="200" y1="150" x2="1000" y2="250" stroke="#48db9c" stroke-width="1" stroke-opacity="0.15"/>
  
  <!-- Text -->
  <text x="600" y="350" text-anchor="middle" fill="#8A9BB8" font-family="Arial" font-size="20" opacity="0.6">
    Technology Infrastructure
  </text>
</svg>
