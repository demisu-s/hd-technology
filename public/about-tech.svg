<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#48db9c;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#0C1525;stop-opacity:0.9" />
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="#0C1525"/>
  <rect x="0" y="0" width="800" height="400" fill="url(#grad3)"/>
  
  <!-- Abstract tech shapes -->
  <rect x="100" y="80" width="200" height="30" rx="6" fill="#48db9c" opacity="0.3"/>
  <rect x="100" y="130" width="300" height="20" rx="4" fill="#48db9c" opacity="0.2"/>
  <rect x="100" y="170" width="250" height="20" rx="4" fill="#48db9c" opacity="0.15"/>
  
  <rect x="450" y="80" width="200" height="30" rx="6" fill="#48db9c" opacity="0.25"/>
  <rect x="450" y="130" width="250" height="20" rx="4" fill="#48db9c" opacity="0.15"/>
  
  <!-- Circuit lines -->
  <circle cx="400" cy="200" r="50" fill="none" stroke="#48db9c" stroke-width="2" stroke-opacity="0.3"/>
  <circle cx="400" cy="200" r="25" fill="#48db9c" opacity="0.15"/>
  <circle cx="400" cy="200" r="10" fill="#48db9c" opacity="0.4"/>
  
  <line x1="400" y1="150" x2="400" y2="120" stroke="#48db9c" stroke-width="2" stroke-opacity="0.3"/>
  <line x1="400" y1="250" x2="400" y2="280" stroke="#48db9c" stroke-width="2" stroke-opacity="0.3"/>
  <line x1="350" y1="200" x2="320" y2="200" stroke="#48db9c" stroke-width="2" stroke-opacity="0.3"/>
  <line x1="450" y1="200" x2="480" y2="200" stroke="#48db9c" stroke-width="2" stroke-opacity="0.3"/>
  
  <!-- Small dots -->
  <circle cx="320" cy="200" r="5" fill="#48db9c" opacity="0.4"/>
  <circle cx="480" cy="200" r="5" fill="#48db9c" opacity="0.4"/>
  <circle cx="400" cy="120" r="5" fill="#48db9c" opacity="0.4"/>
  <circle cx="400" cy="280" r="5" fill="#48db9c" opacity="0.4"/>
  
  <!-- Text -->
  <text x="400" y="360" text-anchor="middle" fill="#8A9BB8" font-family="Arial" font-size="18" opacity="0.5">
    Innovation at Work
  </text>
</svg>
